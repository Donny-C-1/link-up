<!Doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <meta name="author" content="Donny C" />
    <link rel="stylesheet" href="./css/style.css">
    <script type="module" src="./js/script.js"></script>
</head>

<body>

    <main class="main">
        <aside class="sidebar">
            <div class="inner">
                <div>
                    <img src="./images/avatar3.png" alt="Profile Image" width="50" height="50" class="profile_picture">
                    <p>Log out</p>
                </div>
                <nav>
                    <ul class="nav_list">
                        <li>
                            <a href="/home" data-action="toggle_nav">
                                <svg width="30" height="30">
                                    <use href="#svg_house" />
                                </svg>
                                <p>Home</p>
                            </a>
                        </li>
                        <li>
                            <a href="/messages" data-action="toggle_nav" class="active">
                                <svg width="30" height="30">
                                    <use href="#svg_letter" />
                                </svg>
                                <p>Messages</p>
                            </a>
                        </li>
                        <li>
                            <a href="/groups" data-action="toggle_nav">
                                <svg width="30" height="30">
                                    <use href="#svg_group" />
                                </svg>
                                <p>Groups</p>
                            </a>
                        </li>
                        <li>
                            <a href="/notifications" data-action="toggle_nav">
                                <svg width="30" height="30">
                                    <use href="#svg_bell" />
                                </svg>
                                <p>Notifications</p>
                            </a>
                        </li>
                        <li>
                            <a href="/settings" data-action="toggle_nav">
                                <svg width="30" height="30">
                                    <use href="#svg_settings" />
                                </svg>
                                <p>Settings</p>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </aside>

        <div class="middle visible">
            <div class="conversation_area">
                <div class="conversation_header">
                    <div class="top">
                        <button class="nav_toggle">
                            <svg width="20" height="20"><use href="#svg_menu"/></svg>
                        </button>
                        <h1>Messages</h1>
                        <button class="btn new_chat">
                            <svg width="15" height="15">
                                <use href="#svg_pen" />
                            </svg>
                            <span>New</span>
                        </button>
                    </div>

                    <div class="search_bar">
                        <input type="text" name="search" class="search_input" placeholder="Search" />
                        <svg width="10" height="10" class="icon">
                            <use href="#svg_search" />
                        </svg>
                    </div>

                    <div class="bottom">
                        <p>Sort by</p>
                        <button>
                            <span>Latest</span>
                            <svg width="10" height="10">
                                <use href="#svg_caret_down" />
                            </svg>
                        </button>
                    </div>
                </div>
                <hr />
                <div class="conversation_body">
                    <ul class="conversation_list"></ul>
                </div>
            </div>
        </div>

        <div class="last">
            <div class="chat_area">
                <div class="head">
                    <div>
                        <h2 class="contact_name">Denice Ekdahl</h2>
                        <p class="contact_info"><span class="contact_status">Online</span> &sdot; Last message <span>10 minutes</span> ago</p>
                    </div>
                    <button class="options">
                        <svg width="30" height="30">
                            <use href="#svg_options" />
                        </svg>
                    </button>
                </div>
                <hr />
                <div class="message_section">
                    
                </div>
                <div class="input_bar">
                    <input type="text" class="message_input" />
                    <button data-action="send_message" class="btn">Send</button>
                </div>
            </div>
        </div>
    </main>

    <!-- * Templates -->
    <template id="conversation_template">
        <li>
            <button class="conversation">
                <img class="chat_img" src="./images/avatar1.png" alt="contact user profile pic" width="40" height="40" />
                <div class="conversation_info">
                    <div class="conversation_head">
                        <h3 class="conversation_name">Langke Zambo</h3>
                        <span class="conversation_time">Active 3 mins ago</span>
                    </div>
                    <p class="conversation_status">Online</p>
                    <div class="conversation_message_cont">
                        <p class="conversation_message">Oh, okay. Let me go ask and I'll get back to you tomorrow okay See you then</p>
                    </div>
                </div>
            </button>
        </li>
    </template>

    <template id="received_message_template">
        <div class="message">
            <div class="message_inner">
                <img src="./images/avatar1.png" alt="profile pic" width="40" height="40" class="message_image" />
                <p class="message_content">Any updates on interview schedules?</p>
            </div>
            <p class="message_time">Today 9:38am</p>
        </div>
    </template>

    <template id="sent_message_template">
        <div class="message sent">
            <div class="message_inner">
                <p class="message_content">Some stuff</p>
                <img src="./images/avatar1.png" alt="profile pic" width="40" height="40" class="message_image" />
            </div>
            <p class="message_time">Today 9:38am</p>
        </div>
    </template>
